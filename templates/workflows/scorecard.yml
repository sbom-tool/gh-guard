# OpenSSF Scorecard workflow for {{CRATE_NAME}}
# Generated by gh-guard — https://github.com/gh-guard/gh-guard
#
# Runs weekly + on push to main. Results uploaded to GitHub Security tab (SARIF)
# and published to api.securityscorecards.dev for badge generation.

name: Scorecard supply-chain security

on:
  push:
    branches: [main]
  schedule:
    - cron: "30 1 * * 6" # Saturday 01:30 UTC
  workflow_dispatch:

# publish_results requires read-all at workflow level
permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Run analysis
        # v2.4.3
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        # v7.0.0
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        # v4
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98
        with:
          sarif_file: results.sarif
