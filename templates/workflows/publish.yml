  provenance:
    needs: [publish]
    permissions:
      actions: read
      id-token: write
      contents: write
    # CRITICAL: Must reference by tag, not SHA — SLSA generator requirement
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.publish.outputs.hashes }}"
      upload-assets: false
      provenance-name: {{CRATE_NAME}}.intoto.jsonl
      # WORKSPACE VARIANT: use a generic name, e.g.: workspace.intoto.jsonl

  release:
    name: Create GitHub Release
    needs: [publish, provenance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Download SLSA provenance
        # v4
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16
        with:
          name: {{CRATE_NAME}}.intoto.jsonl
          path: provenance/

      - name: Create GitHub Release with provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ env.PUBLISH_TAG }}
        run: |
          gh release create "$TAG_NAME" \
            provenance/{{CRATE_NAME}}.intoto.jsonl \
            --title "$TAG_NAME" \
            --generate-notes \
            --verify-tag
