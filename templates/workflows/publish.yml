# Publish workflow for {{CRATE_NAME}}
# Generated by gh-guard — https://github.com/gh-guard/gh-guard
#
# Three-job pipeline: publish (crates.io via OIDC) → provenance (SLSA L3) → release (GitHub)
#
# PREREQUISITES:
#   1. Create "crates-io" environment in repo Settings > Environments
#   2. Configure Trusted Publishing at crates.io/crates/{{CRATE_NAME}}/settings
#      (repo: {{REPO_OWNER}}/{{REPO_NAME}}, workflow: publish.yml, environment: crates-io)
#   3. Ensure Cargo.toml version matches the tag before pushing
#
# CRITICAL GOTCHAS:
#   - SLSA generator MUST use @tag reference, not SHA (reusable workflow requirement)
#   - If your org has immutable releases, provenance must be generated BEFORE the
#     GitHub Release is created — you cannot upload assets after creation
#   - fetch-depth: 0 is required for ancestry verification (--depth=1 breaks it)

name: Publish to crates.io

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g., v0.1.5) — use when retrying a failed publish"
        required: true
        type: string

permissions: read-all

env:
  CARGO_TERM_COLOR: always
  # Resolve the tag name from either trigger type
  PUBLISH_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  publish:
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && startsWith(inputs.tag, 'v'))
    environment: crates-io
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ env.PUBLISH_TAG }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust stable
        # stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2

      - name: Verify tag matches crate version
        shell: bash
        env:
          TAG_REF: ${{ env.PUBLISH_TAG }}
        run: |
          set -euo pipefail
          TAG_VERSION="${TAG_REF#v}"

          if [[ ! "${TAG_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag version (${TAG_VERSION}) is not valid semver."
            exit 1
          fi

          CRATE_VERSION="$(sed -nE 's/^version = "([^"]+)"/\1/p' Cargo.toml | head -n1)"
          if [[ -z "${CRATE_VERSION}" ]]; then
            echo "::error::Unable to parse crate version from Cargo.toml"
            exit 1
          fi
          if [[ "${TAG_VERSION}" != "${CRATE_VERSION}" ]]; then
            echo "::error::Tag version (${TAG_VERSION}) does not match Cargo.toml version (${CRATE_VERSION})"
            exit 1
          fi

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "::error::Tagged commit ${GITHUB_SHA} is not on origin/main."
            exit 1
          fi

          echo "Publishing version ${CRATE_VERSION}"

      ## ── WORKSPACE VARIANT (uncomment and replace the step above) ──
      # - name: Install jq
      #   run: sudo apt-get install -y jq
