      - name: Run tests
        run: cargo test --locked --all-features --verbose

      - name: cargo-deny
        # v2
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979
        with:
          arguments: --all-features

      - name: Dry-run publish
        run: cargo publish --dry-run --locked

      ## ── WORKSPACE VARIANT (uncomment and replace the dry-run step above) ──
      # - name: Dry-run publish (workspace)
      #   run: |
      #     CRATES=({{WORKSPACE_CRATES//,/ }})
      #     for crate in "${CRATES[@]}"; do
      #       echo "Dry-run publish for $crate..."
      #       cargo publish -p "$crate" --dry-run --locked
      #     done

      - name: Build crate archive for provenance
        run: cargo package --locked

      - name: Generate subject hashes
        id: hash
        run: |
          echo "hashes=$(sha256sum target/package/{{CRATE_NAME}}-*.crate | base64 -w0)" >> "$GITHUB_OUTPUT"

      ## ── WORKSPACE VARIANT (uncomment and replace the hash step above) ──
      # - name: Generate subject hashes (workspace)
      #   id: hash
      #   run: |
      #     echo "hashes=$(sha256sum target/package/*.crate | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@c2f7455177fbf986ee0f82f0932f8290b8769cce # v1
        id: auth

      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked

      ## ── WORKSPACE VARIANT (uncomment and replace the publish step above) ──
