# Fuzz testing workflow for {{CRATE_NAME}}
# Generated by gh-guard — https://github.com/gh-guard/gh-guard
#
# Runs on push/PR (when parser code or fuzz targets change), weekly, and on demand.
# Each fuzz target runs for 120 seconds by default.
#
# PREREQUISITES:
#   1. Install cargo-fuzz: cargo install cargo-fuzz
#   2. Initialize: cargo fuzz init
#   3. Add targets: cargo fuzz add <target_name>
#   4. Update the matrix.target list below with your fuzz targets

name: Fuzz testing

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "fuzz/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "fuzz/**"
  schedule:
    - cron: "0 3 * * 1" # Monday 03:00 UTC
  workflow_dispatch:

permissions: read-all

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          # Replace with your fuzz targets from fuzz/Cargo.toml [[bin]] entries
          - {{FUZZ_TARGETS}}
    steps:
      - name: Checkout
        # v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Install nightly toolchain
        # nightly
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: nightly

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          workspaces: fuzz -> target
          key: fuzz-${{ matrix.target }}

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzzer
        run: |
          cargo +nightly fuzz run ${{ matrix.target }} -- \
            -max_total_time=120

      - name: Upload crash artifacts
        # v6.0.0
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        if: failure()
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30
