# Dependabot configuration for {{CRATE_NAME}}
# Generated by gh-guard — https://github.com/gh-guard/gh-guard
#
# Monitors two ecosystems:
#   - github-actions: keeps action SHAs up to date
#   - cargo: keeps Rust dependencies fresh

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
